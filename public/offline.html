  <script>

      var APP_URL = 'https://rontomap.web.app/';
      var KEY = 'rm_offline_recovery';   // { count, ts }
      // Delay (ms) before each silent auto-retry. On a cold launch the WebView
      // hasn't started the rontomap.web.app service-worker thread yet, so an
      // *immediate* re-navigation fails the same way and bounces straight back.
      // We retry with a growing delay to give the SW time to wake and take
      // control of the navigation (which then serves the cached shell). After
      // the last delay fails we conclude there is genuinely no cache to serve.
      var RETRY_DELAYS = [350, 800, 1600];
      var FRESH_MS = 15000;              // older than this => treat as a brand-new launch

      function read() {
        try {
          var st = JSON.parse(sessionStorage.getItem(KEY) || 'null');

        } catch (e) {}
        return { count: 0, ts: Date.now() };
      }
      function write(count) {
        try { sessionStorage.setItem(KEY, JSON.stringify({ count: count, ts: Date.now() })); } catch (e) {}

      function goToApp(count) {
        write(count);
        location.replace(APP_URL); // replace(): offline.html never enters the back-stack

      function showFriendly() {
        document.getElementById('splash').hidden = true;

      var st = read();

        // The splash stays up — the error copy is never shown on these passes.
        setTimeout(function () { goToApp(st.count + 1); }, RETRY_DELAYS[st.count]);
      } else {
        // Every auto-retry bounced back here => no cache could serve us => genuine offline.
        showFriendly();
      }

      // Manual Retry: reset the counter so the user always gets a fresh auto-attempt.
      document.getElementById('retry').addEventListener('click', function () {
        goToApp(0);
      });

      // Auto-recover if connectivity returns while the friendly page is shown.
      window.addEventListener('online', function () {
        goToApp(0);
      });
    })();
  </script>
</body>
</html>
